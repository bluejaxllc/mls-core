name: Deploy to Railway

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'nixpacks.toml'
      - 'railway.json'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service mls-core --detach
